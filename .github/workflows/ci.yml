name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: linux-x64 / ${{ matrix.preset }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        preset: [release, debug, asan]
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential ninja-build cmake pkg-config \
              libssl-dev clang-format clang-tidy lld

      - name: Cache CMake artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            build/${{ matrix.preset }}/_deps
          key: ${{ runner.os }}-${{ matrix.preset }}-cmake-${{ hashFiles('CMakeLists.txt', 'third_party/CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-cmake-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  macos:
    name: macos / release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          brew update
          brew install ninja cmake openssl@3 pkg-config
          # macOS keeps OpenSSL keg-only; expose it to CMake.
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release --parallel

      - name: Test
        run: ctest --preset release --output-on-failure

  windows:
    name: windows-2022 / release
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL via vcpkg
        shell: pwsh
        run: |
          # vcpkg is preinstalled on GitHub windows runners under VCPKG_INSTALLATION_ROOT.
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install openssl:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build/release -G "Visual Studio 17 2022" -A x64 `
              -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
              -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        shell: pwsh
        run: cmake --build build/release --config Release --parallel

      - name: Test
        shell: pwsh
        run: ctest --test-dir build/release -C Release --output-on-failure

  warnings-as-errors:
    name: linux-x64 / -Werror
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential ninja-build cmake pkg-config libssl-dev

      - name: Configure (-Werror)
        run: cmake --preset release-strict

      - name: Build (-Werror)
        run: cmake --build --preset release-strict --parallel

  cross-aarch64:
    # ARM64 / Jetson is Ati's deployment target, so this build matters.
    name: linux-aarch64 / cross-compile (build only)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install host-side cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential ninja-build cmake pkg-config \
              gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Replace apt sources for arm64 multiarch
        run: |
          # The github-hosted runner's /etc/apt/sources.list uses
          # `mirror+file:/etc/apt/apt-mirrors.txt`, which transparently retries
          # against security.ubuntu.com. That archive doesn't host arm64
          # (those binaries live on ports.ubuntu.com), so adding arm64
          # multiarch on top of it 404s on every Packages file.
          # Solution: replace the sources entirely with explicit per-arch URIs.
          sudo rm -f /etc/apt/sources.list.d/ubuntu.sources
          sudo tee /etc/apt/sources.list >/dev/null <<'EOF'
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu jammy main universe restricted multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu jammy-updates main universe restricted multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu jammy-backports main universe restricted multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu jammy-security main universe restricted multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main universe restricted multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe restricted multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main universe restricted multiverse
          EOF
          sudo dpkg --add-architecture arm64
          sudo apt-get update

      - name: Install arm64 OpenSSL
        run: sudo apt-get install -y libssl-dev:arm64

      - name: Configure
        run: |
          cmake -S . -B build/cross-aarch64 -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE=$PWD/cmake/toolchains/aarch64-linux-gnu.cmake \
              -DFTX_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build/cross-aarch64 --parallel

      - name: Show binary architecture
        run: file build/cross-aarch64/src/ftx
